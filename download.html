<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolNet Apex - Tester Download</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #010D21;
  --bg-card: #081929;
  --border: #1e293b;
  --border-accent: #2563eb;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-bright: #f8fafc;
  --accent: #3b82f6;
  --accent-glow: rgba(59, 130, 246, 0.15);
  --green: #22c55e;
  --red: #ef4444;
  --font-body: 'Outfit', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 480px;
  width: 100%;
  padding: 0 24px;
  position: relative;
  z-index: 1;
  text-align: center;
}

.logo {
  margin-bottom: 32px;
}

.logo img {
  height: 120px;
}

h1 {
  font-size: 24px;
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 8px;
}

.subtitle {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 32px;
}

.auth-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px 24px;
}

.input-group {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.input-group input {
  flex: 1;
  padding: 12px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-bright);
  font-family: var(--font-mono);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.input-group input:focus {
  border-color: var(--accent);
}

.input-group input::placeholder {
  color: var(--text-dim);
}

.btn {
  padding: 12px 24px;
  background: var(--accent);
  color: white;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
}

.btn:hover {
  background: #2563eb;
}

.error {
  color: var(--red);
  font-size: 13px;
  margin-top: 12px;
  display: none;
}

.download-area {
  display: none;
  margin-top: 24px;
  padding: 24px;
  background: rgba(34, 197, 94, 0.08);
  border: 1px solid rgba(34, 197, 94, 0.3);
  border-radius: 8px;
}

.download-area h3 {
  color: var(--green);
  font-size: 16px;
  margin-bottom: 12px;
}

.download-area a {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  background: var(--green);
  color: white;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  border-radius: 8px;
  text-decoration: none;
  transition: opacity 0.2s;
}

.download-area a:hover {
  opacity: 0.9;
}

.download-meta {
  margin-top: 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
}

footer {
  margin-top: 32px;
  font-size: 13px;
  color: var(--text-dim);
}

footer a {
  color: var(--accent);
  text-decoration: none;
}
</style>
</head>
<body>
<div class="container">

<div class="logo">
  <img src="solnet-logo.png" alt="SolNet">
</div>

<h1>Tester Download</h1>
<p class="subtitle">Enter the access code provided in your approval email.</p>

<div class="auth-box">
  <div class="input-group">
    <input type="password" id="accessCode" placeholder="Access code" onkeydown="if(event.key==='Enter')checkAccess()">
    <button class="btn" onclick="checkAccess()">Enter</button>
  </div>
  <div class="error" id="errorMsg">Invalid access code. Check your email and try again.</div>

  <div class="download-area" id="downloadArea">
    <h3>Access granted</h3>
    <a href="files/apex-v0.9-linux-x64.tar.gz" download>
      Download Apex v0.9
    </a>
    <div class="download-meta">apex-v0.9-linux-x64.tar.gz  |  37 MB  |  Linux / WSL2</div>
  </div>
</div>

<footer>
  <a href="/">Back to solnet.world</a>
</footer>

</div>

<script>
function checkAccess() {
  var code = document.getElementById('accessCode').value;
  // Simple hash check - not cryptographically secure but prevents casual access
  var hash = 0;
  for (var i = 0; i < code.length; i++) {
    var c = code.charCodeAt(i);
    hash = ((hash << 5) - hash) + c;
    hash = hash & hash;
  }
  // Change this hash value when you set your password
  // To generate: run the page, type your password, check console for hash
  if (hash === 1042021669) {
    document.getElementById('downloadArea').style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('accessCode').style.display = 'none';
    document.querySelector('.btn').style.display = 'none';
    document.querySelector('.subtitle').textContent = 'Thank you for testing SolNet Apex.';
  } else {
    document.getElementById('errorMsg').style.display = 'block';
    console.log('Hash for entered code:', hash);
  }
}
</script>
</body>
</html>
